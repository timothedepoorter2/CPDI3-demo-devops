name: CI pipeline

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev

jobs:
  CI:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: install node
        uses: actions/setup-node@v3
        with:
          node-version: 24

      - name: install dependencies
        run: npm install

      - name: build app
        run: npm run build

      - name: start server
        run: npm start &

      - name: wait server
        run: npx wait-on http://localhost:3000

      - name: run test home page
        run: npx tsx app/__tests__/home.test.tsx